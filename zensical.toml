[project]
site_name = "footman"
site_description = "A task runner with typed commands and instant completion — the soul of duty and the UX of typer."
site_author = "Willem Kokke"
site_url = "https://willemkokke.github.io/footman/"
repo_url = "https://github.com/willemkokke/footman"
repo_name = "willemkokke/footman"
copyright = """
Copyright &copy; 2026 Willem Kokke — MIT licensed
"""

nav = [
  { "Home" = "index.md" },
  { "Getting started" = "getting-started.md" },
  { "Guide" = [
    { "Typed signatures" = "typing.md" },
    { "Chaining & parallelism" = "orchestration.md" },
    { "Running tools" = "tools.md" },
    { "The tools bridge" = "tools-bridge.md" },
    { "Monorepos & config" = "monorepos.md" },
    { "Composing tasks" = "composing.md" },
    { "Testing your tasks" = "testing.md" },
    { "Custom CLI" = "custom-cli.md" },
  ] },
  { "Completion" = "completion.md" },
  { "Machine use" = [
    { "CI" = "ci.md" },
    { "JSON output" = "json.md" },
  ] },
  { "About" = [
    { "Comparison" = "comparison.md" },
    { "Migrating" = "migrating.md" },
    { "Coverage" = "coverage.md" },
    { "Changelog" = "changelog.md" },
  ] },
  { "Reference" = [
    { "CLI reference" = "reference.md" },
    { "API reference" = "api.md" },
    { "Troubleshooting" = "troubleshooting.md" },
  ] },
]

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = false
show_root_heading = true
show_symbol_type_heading = true
show_symbol_type_toc = true
separate_signature = true
heading_level = 2

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/willemkokke/footman"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/footman/"

# Markdown extensions — the validated default set from `zensical new`.
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
# Include the repo-root CHANGELOG.md into docs/changelog.md — one source of truth.
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
check_paths = true

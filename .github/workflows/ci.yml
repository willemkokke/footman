name: CI

on:
  # The workflow always triggers; the `changes` job below decides whether the
  # heavy jobs run. A workflow-level `paths-ignore` can't be used: these jobs
  # are *required* status checks, and a workflow skipped by a path filter never
  # reports them — a docs-only PR would wait forever on checks that never run.
  # A job skipped by an `if:` still reports (as "skipped", which counts as
  # passing), so docs-only changes clear the gate while code changes run it all.
  push:
    branches: [main]
  pull_request:
  # Lets release.yml require a full CI pass on the tagged commit before it
  # will build and publish.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Which part of the tree changed? A docs-only change (docs/, *.md,
  # zensical.toml, docs.yml) skips the heavy jobs below: they report "skipped",
  # which satisfies the required status checks without running the full matrix.
  # Anything that can affect behaviour flips `code` true and runs everything.
  changes:
    name: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              files="$(gh pr view "${{ github.event.pull_request.number }}" \
                --repo "${{ github.repository }}" --json files -q '.files[].path')" ;;
            push)
              # A tag push is a release: release.yml calls this workflow on the
              # tag (inheriting event_name 'push') and it must run the whole
              # gate. Branch pushes (main) diff against the parent commit.
              if [ "${{ github.ref_type }}" = "tag" ]; then
                echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
              fi
              files="$(git diff --name-only \
                "${{ github.event.before }}" "${{ github.sha }}")" ;;
            *)
              # Any other trigger: run the full gate.
              echo "code=true" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          echo "Changed files:"; printf '%s\n' "$files"
          # `code` is true when any changed path falls outside the docs-only
          # set (kept in step with the Docs workflow's own filter). Count with
          # grep -c, never -q: -q exits on the first match, and under GitHub's
          # `-o pipefail` shell that SIGPIPEs the upstream printf and fails the
          # pipeline, which would mis-report a code change as docs-only.
          docs_re='^docs/|^zensical\.toml$|\.md$|^\.github/workflows/docs\.yml$'
          non_docs="$(printf '%s\n' "$files" | grep -cvE "$docs_re" || true)"
          if [ "${non_docs:-0}" -gt 0 ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: lint · format · types
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      # --group shots: rich's types, so basedpyright can resolve the lazy
      # imports inside the `docs shots` task body.
      - run: uv sync --frozen --group shots
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format)
        run: uv run ruff format --check .
      - name: Type-check
        run: uv run basedpyright

  test:
    name: py${{ matrix.python }} · ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # `3.14t` is uv's free-threaded (no-GIL) selector. footman runs tasks in
        # real parallel threads by default, so a scheduler/output-router data
        # race surfaces here — tested on every OS, since Windows (spawn, not
        # fork; distinct console model) exercises different concurrency paths
        # than Linux and would hide OS-specific races otherwise.
        python: ["3.11", "3.12", "3.13", "3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      # --group shots: rich (pure Python) so the `docs shots` render test
      # runs on every POSIX job instead of skipping.
      - run: uv sync --frozen --group shots
      # Each job contributes a distinctly-named data file to the merged
      # coverage gate; the per-job threshold is disabled (a single OS or
      # Python can only ever see its own branches).
      - name: Test
        run: uv run pytest -q --cov=footman --cov-report= --cov-fail-under=0
        env:
          COVERAGE_FILE: .coverage.${{ matrix.os }}-py${{ matrix.python }}
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python }}
          path: .coverage.*
          include-hidden-files: true

  shells:
    name: completion · real shells · ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      NU_VERSION: "0.114.1"
      # Every shell this platform can drive is installed below, so the functional
      # tests must RUN, not skip — test_ci_provisions_every_testable_shell asserts
      # they are on PATH, turning a broken install into a hard failure instead of
      # a green skip. Windows drives only nushell + pwsh (the posix shells are
      # @_posix_shell-gated); macOS and Linux drive all five.
      FOOTMAN_REQUIRE_SHELLS: "1"
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install shells (Linux — zsh, fish, nushell; pwsh preinstalled)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q zsh fish
          curl -fsSL "https://github.com/nushell/nushell/releases/download/${NU_VERSION}/nu-${NU_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          echo "$PWD/nu-${NU_VERSION}-x86_64-unknown-linux-gnu" >> "$GITHUB_PATH"

      - name: Install shells (macOS — fish, nushell, pwsh; bash + zsh native)
        if: runner.os == 'macOS'
        run: |
          brew install fish nushell
          # pwsh ships on the macOS runner; only fetch it if that ever changes.
          # The plain `powershell` cask was retired, so fall back to @preview.
          command -v pwsh >/dev/null || brew install --cask powershell@preview

      - name: Install shells (Windows — nushell; pwsh preinstalled)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/nushell/nushell/releases/download/$env:NU_VERSION/nu-$env:NU_VERSION-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile nu.zip
          Expand-Archive -Path nu.zip -DestinationPath nu-bin
          $dir = (Get-ChildItem -Path nu-bin -Recurse -Filter nu.exe | Select-Object -First 1).DirectoryName
          Add-Content -Path $env:GITHUB_PATH -Value $dir

      # --group shots: rich + pyte, so the animated-cast test drives a real
      # zsh here alongside the completion hooks.
      - run: uv sync --frozen --group shots
      # -rs reports any skip; the FOOTMAN_REQUIRE_SHELLS guard test fails the run
      # if a shell this platform should drive is missing. These runs drive
      # _complete/_shellcomp through real shells — branches the plain suite
      # never reaches — so they contribute to the merged coverage too.
      - name: Functional completion tests
        run: >
          uv run pytest tests/test_shellcomp.py -q -rs
          --cov=footman --cov-report= --cov-fail-under=0
        env:
          COVERAGE_FILE: .coverage.shells-${{ matrix.os }}
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-shells-${{ matrix.os }}
          path: .coverage.*
          include-hidden-files: true

  coverage:
    # One merged total across every OS, Python, and the real-shell jobs —
    # platform-only branches (Windows run(), pwsh profiles, the pty shots
    # path) are credited by the jobs that actually execute them, and
    # fail_under (pyproject) gates the whole picture, not one slice.
    name: coverage ≥ fail_under (merged)
    needs: [test, shells, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --frozen
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Combine and gate
        run: |
          uv run coverage combine
          uv run coverage report
      # The published coverage page shows THIS merged picture, not one
      # slice: render it here, hand it to the docs builds as an artifact.
      - name: Render merged HTML report
        run: uv run coverage html -d htmlcov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov

  docs:
    name: docs build (strict)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --group dev --group docs
      # The docs build records completion casts in every shell — install
      # the ones the runner lacks (bash + pwsh are preinstalled).
      - name: Install shells (for the completion casts)
        env:
          NU_VERSION: "0.114.1"
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q zsh fish
          curl -fsSL "https://github.com/nushell/nushell/releases/download/${NU_VERSION}/nu-${NU_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          echo "$PWD/nu-${NU_VERSION}-x86_64-unknown-linux-gnu" >> "$GITHUB_PATH"
      # This job validates that the site *builds*; its output is never
      # published (the Pages deploy fetches the real merged report), so the
      # embedded-coverage requirement is satisfied with a placeholder.
      - name: Placeholder coverage embed
        run: |
          mkdir -p docs/htmlcov
          echo '<html><body>placeholder — the deployed site embeds the merged report</body></html>' > docs/htmlcov/index.html
      # The build itself is a production-shaped run of the taskdocs pipeline
      # — page/site/globals rendering, five shell casts, the pty responder —
      # so it is measured and merged into the coverage gate like any test
      # job. Child fm processes aren't traced; the suite covers those.
      - name: Build site (strict, under coverage)
        run: uv run coverage run -m footman docs build --check
        env:
          COVERAGE_FILE: .coverage.docs-build
          # The casts spawn real shells which spawn `fm --complete`; this
          # arms coverage in those children so the completion hot path is
          # measured as the shells actually invoke it.
          COVERAGE_PROCESS_START: pyproject.toml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-docs-build
          path: .coverage.*
          include-hidden-files: true

  # The single required status check. It passes when every job succeeded or
  # was skipped (a docs-only change) and fails if any failed or was cancelled.
  # Branch protection requires only this: a matrix job's `result` is its
  # overall result, so `gate` sidesteps the "a skipped matrix job doesn't
  # expand its per-combo checks" problem that leaves the individual `py… · …`
  # names unsatisfiable on a docs-only PR.
  gate:
    name: gate
    needs: [changes, quality, test, shells, coverage, docs]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Every job passed or was skipped
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "job results: $RESULTS"
          for r in $RESULTS; do
            case "$r" in
              success | skipped) ;;
              *) echo "::error::a required job did not pass: $r"; exit 1 ;;
            esac
          done
          echo "all required jobs passed or were skipped"

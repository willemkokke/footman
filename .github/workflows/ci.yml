name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets release.yml require a full CI pass on the tagged commit before it
  # will build and publish.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · format · types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format)
        run: uv run ruff format --check .
      - name: Type-check
        run: uv run basedpyright

  test:
    name: py${{ matrix.python }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --frozen
      - name: Test
        run: uv run pytest -q

  shells:
    name: completion · real shells
    runs-on: ubuntu-latest
    env:
      NU_VERSION: "0.114.1"
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install zsh and fish
        run: sudo apt-get update -q && sudo apt-get install -y -q zsh fish
      - name: Install nushell (pinned release binary)
        run: |
          curl -fsSL "https://github.com/nushell/nushell/releases/download/${NU_VERSION}/nu-${NU_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          echo "$PWD/nu-${NU_VERSION}-x86_64-unknown-linux-gnu" >> "$GITHUB_PATH"
      - run: uv sync --frozen
      # -rs: report skips — every functional shell test must actually run
      # here (bash/zsh/fish/nushell installed above; pwsh ships on runners).
      - name: Functional completion tests
        run: uv run pytest tests/test_shellcomp.py -q -rs

  coverage:
    name: coverage ≥ fail_under
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --frozen
      - name: Test with coverage gate
        run: uv run pytest -q --cov=footman

  docs:
    name: docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --group dev --group docs
      # docs/coverage.md embeds the htmlcov report, so the strict build needs
      # it to exist — same steps docs.yml uses to deploy.
      - name: Coverage report
        run: uv run pytest --cov=footman --cov-report=html:docs/htmlcov -q
      - name: Build site (strict)
        run: uv run zensical build --clean --strict

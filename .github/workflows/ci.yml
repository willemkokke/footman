name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets release.yml require a full CI pass on the tagged commit before it
  # will build and publish.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · format · types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format)
        run: uv run ruff format --check .
      - name: Type-check
        run: uv run basedpyright

  test:
    name: py${{ matrix.python }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --frozen
      - name: Test
        run: uv run pytest -q

  coverage:
    name: coverage ≥ fail_under
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --frozen
      - name: Test with coverage gate
        run: uv run pytest -q --cov=footman

  docs:
    name: docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --group dev --group docs
      # docs/coverage.md embeds the htmlcov report, so the strict build needs
      # it to exist — same steps docs.yml uses to deploy.
      - name: Coverage report
        run: uv run pytest --cov=footman --cov-report=html:docs/htmlcov -q
      - name: Build site (strict)
        run: uv run zensical build --clean --strict

name: Docs

# Builds the Zensical docs site (API reference via mkdocstrings, embedded
# coverage report) and publishes it to GitHub Pages.
# One-time setup: repository Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "tasks.py" # the llms.txt generator lives here
      - "zensical.toml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --group dev --group docs
      - name: Coverage report
        run: uv run pytest --cov=footman --cov-report=html:docs/htmlcov -q
      - name: Build site
        # The same task devs run — regenerates llms.txt, then builds strictly.
        run: uv run fm docs build --check
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - uses: actions/deploy-pages@v5
        id: deployment

name: Docs

# Builds the Zensical docs site (API reference via mkdocstrings, embedded
# coverage report) and publishes it to GitHub Pages.
# One-time setup: repository Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "tasks.py" # the llms.txt generator lives here
      - "zensical.toml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read # fetch the merged coverage-html artifact from CI runs

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --group dev --group docs
      # The docs build records completion casts in every shell — install
      # the ones the runner lacks (bash + pwsh are preinstalled).
      - name: Install shells (for the completion casts)
        env:
          NU_VERSION: "0.114.1"
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q zsh fish
          curl -fsSL "https://github.com/nushell/nushell/releases/download/${NU_VERSION}/nu-${NU_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          echo "$PWD/nu-${NU_VERSION}-x86_64-unknown-linux-gnu" >> "$GITHUB_PATH"
      # The coverage page embeds the matrix-merged report CI gates on. It
      # must be THIS commit's run: "newest successful run" is the previous
      # commit's while ours is still going, which once published a 54% page
      # for a module the same commit had taken to 100%. A docs-only push
      # runs no CI at all (paths-ignore), so that case falls back to the
      # newest run — coverage cannot have changed — and a fork with no CI
      # history measures locally.
      - name: Coverage report (merged, from this commit's CI run)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rid=""
          for _ in $(seq 1 60); do
            rid=$(gh run list --workflow CI --commit "$GITHUB_SHA" --status success \
                  --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)
            [ -n "$rid" ] && break
            pending=$(gh run list --workflow CI --commit "$GITHUB_SHA" --json status \
                      --jq '[.[] | select(.status != "completed")] | length' 2>/dev/null || echo 0)
            [ "$pending" = "0" ] && break
            echo "waiting for this commit's CI run to finish…"
            sleep 15
          done
          if [ -z "$rid" ]; then
            rid=$(gh run list --workflow CI --branch main --status success --limit 1 \
                  --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)
            [ -n "$rid" ] && echo "no CI run for this commit — using $rid"
          fi
          if [ -n "$rid" ] && gh run download "$rid" -n coverage-html -D docs/htmlcov; then
            echo "merged coverage report from CI run $rid"
          else
            echo "no CI artifact reachable — measuring this environment only"
            uv run pytest --cov=footman --cov-report=html:docs/htmlcov -q
          fi
      - name: Build site
        # The same task devs run — regenerates llms.txt, then builds strictly.
        run: uv run fm docs build --check
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - uses: actions/deploy-pages@v5
        id: deployment
